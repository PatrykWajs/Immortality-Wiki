site_name: Immortality Wiki
site_url: https://patrykwajs.github.io/Immortality-Wiki/
site_description: AI-generated knowledge base from Bryan Johnson's longevity research — 131 videos and PDFs on living to 200+.
repo_url: https://github.com/PatrykWajs/Immortality-Wiki
repo_name: PatrykWajs/Immortality-Wiki

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: green
      accent: deep-orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: deep-orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - All Episodes: MAP.md
  - Guests: GUESTS.md
  - Topic Conclusions:
    - Overview: Conclusions/index.md
    - Diet & Nutrition: Conclusions/diet-and-nutrition.md
    - Exercise & Fitness: Conclusions/exercise-and-fitness.md
    - Sleep & Recovery: Conclusions/sleep-and-recovery.md
    - Supplements & Protocols: Conclusions/supplements-and-protocols.md
    - Biomarkers & Testing: Conclusions/biomarkers-and-testing.md
    - Mental Health: Conclusions/mental-health.md
    - Longevity Science: Conclusions/longevity-science.md
    - Skin & Anti-Aging: Conclusions/skin-and-anti-aging.md
    - Environment & Toxins: Conclusions/environment-and-toxins.md
    - Hormones & Sexual Health: Conclusions/hormones-and-sexual-health.md
    - Technology & AI: Conclusions/technology-and-ai.md
    - Gut Health: Conclusions/gut-health.md
    - Mindset & Philosophy: Conclusions/mindset-and-philosophy.md
  - Episodes:
    - All: MAP.md
